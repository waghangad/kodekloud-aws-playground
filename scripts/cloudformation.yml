{
  "AWSTemplateFormatVersion" : "2010-09-09",
  "Description" : "Template to create S3 bucket.",

  "Resources" : {
    "EKSBucket":{
      "Type": "AWS::S3::Bucket",
      "Properties" : {
        "BucketName": "tf-state-eks-bucket"
      }
    },
    "GenBucket":{
      "Type": "AWS::S3::Bucket",
      "Properties" : {
        "BucketName": "tf-state-gen-bucket"
      }
    },
    "LockDBTable":{
      "Type" : "AWS::DynamoDB::Table",
        "Properties" : {
        "KeySchema" : [ {
          "AttributeName" : "LockID",
          "KeyType" : "HASH"
        }],
        "TableName" : "tf.lock"
      }
    }
  }
}