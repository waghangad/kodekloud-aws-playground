name: Run Terraform
on: 
    - workflow_dispatch
    - push
permissions:
  id-token: write
  contents: read

jobs:
  Terraform-Init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: AKIAQ3EGSS7L77QS3APG
          aws-region: us-east-1
          aws-secret-access-key: aufmUXI5mC+4haQmr2wcQZhHz2S0ThZzxTkGE/2rCr

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve